<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Pod shape -->
  <ellipse cx="64" cy="68" rx="30" ry="38" fill="none" stroke="#fff" stroke-width="4" opacity="0.9"/>
  <!-- Three dots representing agents inside -->
  <circle cx="52" cy="58" r="6" fill="#fff" opacity="0.9"/>
  <circle cx="72" cy="58" r="6" fill="#fff" opacity="0.9"/>
  <circle cx="62" cy="76" r="6" fill="#fff" opacity="0.9"/>
  <!-- Connection lines between agents -->
  <line x1="52" y1="58" x2="72" y2="58" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <line x1="52" y1="58" x2="62" y2="76" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <line x1="72" y1="58" x2="62" y2="76" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <!-- Drop arrow at top -->
  <path d="M64 22 L72 34 L56 34 Z" fill="#fff" opacity="0.8"/>
</svg>
